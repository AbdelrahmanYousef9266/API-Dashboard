<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>API Dashboard</h1>
    <p>Mini apps powered by public APIs</p>
  </header>

  <main class="dashboard">
    <section class="card" id="dog-card">
      <h2>Dog Image</h2>
      <button id="dogBtn">New Dog</button>
      <div id="dogResult"></div>
    </section>

    <section class="card" id="cat-card">
      <h2>Cat Image</h2>
      <button id="catBtn">New Cat</button>
      <div id="catResult"></div>
    </section>

    <section class="card" id="weather-card">
      <h2>Weather</h2>
      <input id="cityInput" type="text" placeholder="Enter city" />
      <button id="weatherBtn">Get Weather</button>
      <div id="weatherResult"></div>
    </section>

    <section class="card" id="currency-card">
      <h2>💱 Currency</h2>
      <button id="currencyBtn">USD to EUR</button>
      <div id="currencyResult"></div>
    </section>

    <section class="card" id="github-card">
      <h2>GitHub User</h2>
      <input id="githubInput" type="text" placeholder="GitHub username" />
      <button id="githubBtn">Search</button>
      <div id="githubResult"></div>
    </section>

    <section class="card" id="joke-card">
      <h2>Joke</h2>
      <button id="jokeBtn">Get Joke</button>
      <div id="jokeResult"></div>
    </section>

    <section class="card" id="movie-card">
      <h2>Movies</h2>
      <button id="movieBtn">Trending Movies</button>
      <div id="movieResult"></div>
    </section>

    <section class="card" id="extra-card">
      <h2>Advice API</h2>
      <button id="extraBtn">Load Extra</button>
      <div id="extraResult"></div>
    </section>
  </main>
<footer>
  <p>© 2026 Abdelrahman Yousef | API Dashboard Project</p>
  <p>
    <a href="https://github.com/AbdelrahmanYousef9266" target="_blank">
      GitHub Profile
    </a>
  </p>
</footer>
  <script src="script.js"></script>
</body>
</html>
